function TeamsGate({children}){
  const[checking,setChecking]=useState(true);
  const[inTeams,setInTeams]=useState(false);
  useEffect(()=>{
    // Wait a moment for Teams SDK to initialize

    return()=>clearTimeout(t);
  },[]);
  if(checking)return e("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#0e0e1a",color:"#ccc",gap:12}},e(Logo),e("span",{style:{fontSize:16}},"Laden..."));
  if(!inTeams)return e("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",background:"#0e0e1a",padding:40,textAlign:"center"}},
    e(Logo),
    e("h2",{style:{color:"#fff",marginTop:20,fontSize:24}},"IVM Planner"),
    e("p",{style:{color:"#888",fontSize:16,marginTop:12,maxWidth:400,lineHeight:1.6}},"Deze app is alleen beschikbaar via Microsoft Teams. Open de IVM Planner tab in je Teams kanaal."),
    e("div",{style:{marginTop:24,padding:"12px 24px",background:"#1a1a30",borderRadius:10,border:"1px solid #252540",color:"#555",fontSize:13}},"Niet ingelogd via Teams"));
  return children;
}
function Root(){
  const[teamId,setTeamId]=useState(null);
  const[teamName,setTeamName]=useState("");
  const[accessOk,setAccessOk]=useState(null);
  
  // Check if running in Teams
  useEffect(()=>{
    setTimeout(()=>{
      // Allow access from Teams OR localhost for development
      const isLocal=location.hostname==="localhost"||location.hostname==="127.0.0.1";
      const isTeams=window.__inTeams===true;
      setAccessOk(isTeams||isLocal);
    },1500); // Wait for Teams SDK to initialize
  },[]);
  
  // Remember last team
  useEffect(()=>{
    const last=localStorage.getItem("ivm-last-team");
    if(last){try{const o=JSON.parse(last);setTeamId(o.id);setTeamName(o.name)}catch{}}
  },[]);
  
  const selectTeam=(id,name)=>{
    setTeamId(id);setTeamName(name);
    localStorage.setItem("ivm-last-team",JSON.stringify({id,name}));
  };
  const goBack=()=>{setTeamId(null);setTeamName("");localStorage.removeItem("ivm-last-team")};
  
  if(accessOk===null)return e("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#0e0e1a",color:"#ccc",gap:12}},e(Logo),e("span",{style:{fontSize:18}},"Verbinding checken..."));
  if(accessOk===false)return e("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",background:"#0e0e1a",padding:40,textAlign:"center"}},e(Logo),e("h2",{style:{marginTop:20,color:"#fff"}},"Toegang Geweigerd"),e("p",{style:{color:"#888",marginTop:10,fontSize:16,maxWidth:400,lineHeight:1.6}},"IVM Planner is alleen beschikbaar via Microsoft Teams. Open de app in Teams om verder te gaan."),e("div",{style:{marginTop:24,padding:"12px 24px",background:"#1a1a30",borderRadius:8,color:"#555",fontSize:13}},"Teams → Apps → IVM Planner"));
  if(!teamId)return e(TeamSelect,{onSelect:selectTeam});
  return e(Planner,{teamId,teamName,onBack:goBack});
}
